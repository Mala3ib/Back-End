<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Your Verification Code - Mala3ib</title>
    <style>
        body {
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .email-wrapper {
            width: 100%;
            background-color: #f4f7f6;
            padding: 40px 0;
        }

        .email-content {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #1a2e35;
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .body-content {
            padding: 40px;
            text-align: center;
            color: #444;
        }

        .body-content h1 {
            color: #1a2e35;
            font-size: 22px;
            margin-top: 0;
        }

        .body-content p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }

        .otp-container {
            background-color: #f8f9fa;
            border: 2px dashed #28a745;
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            display: inline-block;
            min-width: 200px;
        }

        .otp-code {
            font-size: 36px;
            font-weight: bold;
            color: #28a745;
            letter-spacing: 8px;
            margin: 0;
        }

        .footer {
            padding: 25px;
            text-align: center;
            color: #999;
            font-size: 12px;
            background-color: #fafafa;
        }

        .note {
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <div class="email-content">
                    <div class="header">
                        <h2>⚽ MALA3IB</h2>
                    </div>

                    <div class="body-content">
                        <h1>Verification Code</h1>
                        <p>Hi {{UserName}},</p>
                        <p>Use the code below to verify your account and start your match! This code is valid for 10
                            minutes.</p>

                        <div class="otp-container">
                            <p class="otp-code">{{OTP_CODE}}</p>
                        </div>

                        <p class="note">If you didn’t request this, you can ignore this email.</p>
                    </div>

                    <div class="footer">
                        <p>© 2026 Mala3ib Platform | Egypt's Home of Football ⚽</p>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
